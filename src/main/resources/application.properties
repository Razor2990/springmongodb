# === 📦 Configuración de la Aplicación ===
# Nombre del microservicio (útil para identificarlo en logs o dashboards)
spring.application.name=springmongodb

# Conexión a MongoDB (local en el puerto 27017, base de datos "todo-manage-api")
spring.data.mongodb.uri=mongodb://localhost:27017/todo-manage-api

# === 📝 Logging ===
# Nivel de log global
logging.level.root=INFO

# Nivel de log específico para tu paquete (útil para desarrollo o depuración)
logging.level.com.mongodb.springmongodb=DEBUG

# Habilita colores en la salida del log para facilitar su lectura
spring.output.ansi.enabled=ALWAYS

# === 📄 OpenAPI / Swagger ===
# Ruta del JSON de OpenAPI
springdoc.api-docs.path=/v3/api-docs

# Ruta para acceder a Swagger UI
springdoc.swagger-ui.path=/swagger-ui/index.html

# === 📈 Spring Boot Actuator ===
# Expone todos los endpoints de Actuator (recomendado limitar en producción)
management.endpoints.web.exposure.include=*

# Ruta base para acceder a los endpoints de Actuator
management.endpoints.web.base-path=/actuator

# Mostrar detalles completos en el endpoint /actuator/health (por ejemplo: mongo, diskSpace, etc.)
management.endpoint.health.show-details=always

# === 💡 Readiness y Liveness Probes (para Kubernetes/OpenShift) ===

# Define el grupo "readiness" con los componentes que indican si la app está lista
# Incluye 'mongo' (base de datos) y 'ping' (chequeo básico)
management.endpoint.health.group.readiness.include=ping,mongo

# Define el grupo "liveness" con componentes que indican si la app está viva
# Normalmente 'ping' es suficiente
management.endpoint.health.group.liveness.include=ping

# Muestra detalles en los endpoints readiness/liveness
management.endpoint.health.group.readiness.show-details=always
management.endpoint.health.group.liveness.show-details=always
